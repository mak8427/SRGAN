# .github/workflows/ci.yml
# manual run:
# pytest -q --maxfail=1 --disable-warnings --cov=opensr_srgan  --cov-report=term-missing --cov-report=xml


name: CI Tests
on:
  # 1) manual run from the Actions tab
  workflow_dispatch:

  # 2) tagged releases (v*) 
  # 3) any branch push that changes code/tests/dependency manifests
  push:
    branches:
      - '**'        # allow all branches (needed so branches still trigger)
    tags:
      - 'v*'        # run on tags like v1.2.3
    paths:
      - 'opensr_srgan/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"] # "3.10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt
          pip install numpy

      - name: Run tests with coverage
        run: |
          pytest -q --maxfail=1 --disable-warnings \
                 --cov=opensr_srgan \
                 --cov-report=term-missing \
                 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
